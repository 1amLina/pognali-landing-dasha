<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ПОГНАЛИ</title>

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Brand fonts: Oswald (display/accents) + Roboto (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue:   '#2349E9',
              orange: '#FC731C',
              lime:   '#C4F040',
              dark:   '#121212',
              light:  '#FFFFFF',
            },
          },
          fontFamily: {
            display: ['Oswald', 'Impact', 'sans-serif'],
            body:    ['Roboto', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #C4F040; overflow: hidden; }

    .screen {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Forward-leaning, festival type — echoes the logo's oblique wordmark */
    .lean      { transform: skewX(-7deg); }
    .display   { font-family: 'Oswald', Impact, sans-serif; line-height: 0.86; letter-spacing: -0.01em; }

    /* Load reveal */
    .reveal > * {
      opacity: 0;
      transform: translateY(30px);
      animation: rise .7s cubic-bezier(.16,.84,.44,1) forwards;
    }
    .reveal > *:nth-child(1) { animation-delay: .05s; }
    .reveal > *:nth-child(2) { animation-delay: .20s; }
    .reveal > *:nth-child(3) { animation-delay: .34s; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    @media (prefers-reduced-motion: reduce) {
      .reveal > * { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>

<body class="font-body text-brand-dark antialiased">

  <main class="screen bg-brand-lime flex items-center justify-center px-5 relative">
    <div class="reveal w-full max-w-[1100px] flex flex-col items-center justify-center text-center gap-[5vh]">

      <!-- Logo "ПОГНАЛИ" + question mark -->
      <div class="flex items-center justify-center gap-[1.5vw] w-full">
        <h1 class="sr-only">Погнали! В Тулу, туда где свои.</h1>
        <img src="pognali-logo.png" alt="ПОГНАЛИ"
             class="w-[78vw] max-w-[1000px] h-auto block"
             onerror="this.onerror=null;this.src=window.__POGNALI_LOGO__;" aria-hidden="true" />
        <span aria-hidden="true" class="display lean font-bold text-brand-dark leading-none
                   text-[clamp(3rem,18vw,15rem)] -mt-[1.5vw]">!</span>
      </div>

      <!-- В ТУЛУ, ТУДА ГДЕ СВОИ — одна строка, заглавными -->
      <p aria-hidden="true" class="display lean font-bold uppercase text-brand-dark whitespace-nowrap
                text-[clamp(1rem,4.8vw,4.25rem)] leading-none tracking-tight">
        в&nbsp;Тулу, туда где&nbsp;свои
      </p>

    </div>

    <!-- Синяя метка внизу под надписью -->
    <img src="pin-blue.png" alt="" aria-hidden="true"
         class="absolute left-1/2 -translate-x-1/2 bottom-[5vh] h-[9vh] max-h-[80px] w-auto"
         style="animation: rise .7s cubic-bezier(.16,.84,.44,1) .55s both;" />
  </main>
